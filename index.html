<style>
/* Android Chrome compatibility */
* {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
input, textarea, button, select {
  -webkit-appearance: none;
  appearance: none;
  font-family: inherit;
}
html, body {
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: none;
}
button { touch-action: manipulation; }
img { max-width: 100%; height: auto; }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
:root{
  --bg:#f0fafa;
  --bg-elev:#ffffff;
  --bg-sunken:#f1f7f6;
  --ink:#0a1f1c;
  --ink-soft:#3d5a55;
  --ink-mute:#7a8e8b;
  --line:#e4ecea;
  --line-strong:#c5d6d3;
  --primary:#0891b2;
  --primary-deep:#0e7490;
  --primary-soft:#e0f7fa;
  --mint:#10b981;
  --mint-deep:#059669;
  --mint-soft:#d1fae5;
  --aqua:#06b6d4;
  --warn:#f59e0b;
  --danger:#ef4444;
}
html,body{background:linear-gradient(135deg,#e0f7fa 0%,#f0fafa 40%,#e6fffa 80%,#dcfce7 100%);background-attachment:fixed;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);overscroll-behavior:none;min-height:100vh;font-feature-settings:'cv11','ss01','ss02';overflow-x:hidden;width:100%;max-width:100vw;}

input,textarea{max-width:100%;}
::-webkit-scrollbar{display:none;}
textarea,input,select{-webkit-appearance:none;font-family:inherit;font-size:16px;}
@media (max-width:768px){
  input,textarea,select{font-size:16px!important;}
}
button{font-family:inherit;font-feature-settings:inherit;}
.serif{font-family:'Instrument Serif',serif;font-weight:400;letter-spacing:-0.02em;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes drawCircle{from{stroke-dashoffset:var(--circ);}to{stroke-dashoffset:var(--offset);}}
.fade{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1);}
.fadeIn{animation:fadeIn 0.4s ease;}
.scale{animation:scaleIn 0.4s cubic-bezier(0.16,1,0.3,1);}
.dot{animation:pulse 1.4s infinite;}
.float{animation:float 3.5s ease-in-out infinite;}
.glass{backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);}
.tap-effect:active{opacity:0.7;}
input:focus,textarea:focus{border-color:var(--primary)!important;outline:2px solid rgba(8,145,178,0.15);outline-offset:1px;}

/* Water texture for white surfaces */
.water-bg{
  background-color:#ffffff;
  background-image:
    radial-gradient(ellipse 200px 80px at 30% 20%, rgba(165,243,252,0.25), transparent 70%),
    radial-gradient(ellipse 180px 100px at 70% 60%, rgba(207,250,254,0.3), transparent 70%),
    radial-gradient(ellipse 150px 90px at 20% 80%, rgba(186,230,253,0.2), transparent 70%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300' viewBox='0 0 300 300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch' seed='3'/><feColorMatrix values='0 0 0 0 0.04 0 0 0 0 0.57 0 0 0 0 0.7 0 0 0 0.4 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  background-size:auto, auto, auto, 200px 200px;
  background-blend-mode:normal, normal, normal, soft-light;
}

input.water-bg,textarea.water-bg,button.water-bg{
  background-color:#ffffff;
  background-image:
    radial-gradient(ellipse 150px 60px at 30% 30%, rgba(165,243,252,0.2), transparent 70%),
    radial-gradient(ellipse 120px 80px at 70% 70%, rgba(207,250,254,0.25), transparent 70%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' stitchTiles='stitch' seed='7'/><feColorMatrix values='0 0 0 0 0.04 0 0 0 0 0.57 0 0 0 0 0.7 0 0 0 0.35 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/></svg>");
  background-size:auto, auto, 150px 150px;
  background-blend-mode:normal, normal, soft-light;
}

/* ===== Modo oscuro (Fase 3) — override de variables ===== */
html[data-theme="dark"]{
  --bg:#0a1310;
  --bg-elev:#11201c;
  --bg-sunken:#0c1814;
  --ink:#e9f3f0;
  --ink-soft:#a9c2bd;
  --ink-mute:#76928e;
  --line:#1f312c;
  --line-strong:#2e463f;
  --primary:#22b8d4;
  --primary-deep:#3cc7e0;
  --primary-soft:#0c2a31;
  --mint:#34d399;
  --mint-deep:#56e0ab;
  --mint-soft:#0e2a22;
  --aqua:#22d3ee;
  --warn:#fbbf24;
  --danger:#f87171;
  color-scheme:dark;
}
html[data-theme="dark"], html[data-theme="dark"] body{
  background:linear-gradient(135deg,#07120f 0%,#0a1613 45%,#08140f 80%,#0a1810 100%)!important;
  background-attachment:fixed!important;
}
/* Botón flotante de cambio de tema */
#vita-theme-toggle{
  position:fixed;left:14px;bottom:14px;z-index:99997;
  width:44px;height:44px;border-radius:999px;border:1px solid var(--line);
  background:var(--bg-elev);color:var(--ink);font-size:19px;line-height:1;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;
  transition:transform .15s ease;
}
#vita-theme-toggle:hover{transform:translateY(-2px);}
#vita-theme-toggle:active{transform:scale(.94);}

</style>
<script>
(function(){
  var KEY="vita_theme";
  function meta(t){var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute("content",t==="dark"?"#0a1310":"#fafdfc");}
  function apply(t){document.documentElement.setAttribute("data-theme",t);meta(t);}
  var saved=null;try{saved=localStorage.getItem(KEY);}catch(e){}
  var sysDark=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;
  apply(saved||(sysDark?"dark":"light"));
  window.addEventListener("load",function(){
    if(document.getElementById("vita-theme-toggle"))return;
    var b=document.createElement("button");
    b.id="vita-theme-toggle";b.setAttribute("aria-label","Cambiar tema claro/oscuro");b.setAttribute("title","Cambiar tema");
    function ic(){b.textContent=document.documentElement.getAttribute("data-theme")==="dark"?"\u2600":"\u263E";}
    ic();
    b.onclick=function(){var cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";try{localStorage.setItem(KEY,cur);}catch(e){}apply(cur);ic();};
    document.body.appendChild(b);
  });
})();
</script>

</head>

<script src="/app.js"></script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
