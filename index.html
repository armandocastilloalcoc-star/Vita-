<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
:root{
  --bg:#f0fafa;
  --bg-elev:#ffffff;
  --bg-sunken:#f1f7f6;

  --ink-soft:#3d5a55;

html,body{background:linear-gradient(135deg,#e0f7fa 0%,#f0fafa 40%,#e6fffa 80%,#dcfce7 100%);background-attachment:fixed;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);overscroll-behavior:none;min-height:100vh;font-feature-settings:'cv11','ss01','ss02';overflow-x:hidden;width:100%;max-width:100vw;}

input,textarea{max-width:100%;}
::-webkit-scrollbar{display:none;}
textarea,input,select{-webkit-appearance:none;font-family:inherit;font-size:16px;}
@media (max-width:768px){
  input,textarea,select{font-size:16px!important;}
}
button{font-family:inherit;font-feature-settings:inherit;}
.serif{font-family:'Instrument Serif',serif;font-weight:400;letter-spacing:-0.02em;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.fade{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1);}
.fadeIn{animation:fadeIn 0.4s ease;}
.scale{animation:scaleIn 0.4s cubic-bezier(0.16,1,0.3,1);}
.dot{animation:pulse 1.4s infinite;}
.float{animation:float 3.5s ease-in-out infinite;}
.glass{backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);}
.tap-effect:active{opacity:0.7;}
input:focus,textarea:focus{border-color:var(--primary)!important;outline:2px solid rgba(8,145,178,0.15);outline-offset:1px;}

<script type="text/babel">

// ─── PROFILE ──────────────────────────────────────────────────────────────────

function buildProfile(p) {
  if (!p || !p.weight || !p.height) return {profile:"Sin perfil.",target:1500,tdee:2000};
  const imc = (p.weight / Math.pow(p.height/100, 2)).toFixed(1);
  const bmr = p.sex === "M"
    ? 10*p.weight + 6.25*p.height - 5*p.age + 5
    : 10*p.weight + 6.25*p.height - 5*p.age - 161;
  const mult = {sedentary:1.2,light:1.375,moderate:1.55,active:1.725}[p.activity||"light"];
  const tdee = Math.round(bmr * mult);
  const def = Math.min(700, Math.max(300, tdee - 1400));
  const target = Math.max(1200, tdee - def);
  return {profile: `Perfil:
- ${p.sex==="M"?"Hombre":"Mujer"}, ${p.age} anos, ${p.weight}kg, ${p.height}cm. IMC ${imc}.
- Meta: ${p.goalWeight}kg.
- TDEE: ~${tdee}kcal/dia. Objetivo: ~${target}kcal/dia.
- Actividad: ${p.activity||"ligero"}.
${p.restrictions?"- Restricciones: "+p.restrictions:""}
${p.medications?"- Medicamentos: "+p.medications:""}
${p.notes?"- Notas: "+p.notes:""}`, target, tdee};
}

function getMacroTargets(targetKcal, weight) {
  return {
    protein: Math.round(weight * 1.6),
    carbs: Math.round(targetKcal * 0.40 / 4),
    fat: Math.round(targetKcal * 0.30 / 9),
    sugar: Math.round(targetKcal * 0.10 / 4),
    fiber: 30
  };
}

const FOOD_LOG_PROMPT = `Eres nutriologo. Analiza la comida y devuelve SOLO JSON valido (nada mas):
{
  "items": [{"name":"nombre","portion":"porcion","kcal":XXX,"protein":XX,"carbs":XX,"fat":XX,"sugar":XX,"fiber":XX,"sodium":XX}],
  "totals": {"kcal":XXX,"protein":XX,"carbs":XX,"fat":XX,"sugar":XX,"fiber":XX,"sodium":XX},
  "summary": "frase corta"
}
Estima en gramos. sodium en mg. NO uses bloques de codigo.`;

const MEAL_PROMPT = (prof) => prof + `

const getFoodEmoji = (name) => {
  if (!name) return "🍽️";
  const lower = name.toLowerCase().trim();
  // Direct match
  if (FOOD_EMOJIS[lower]) return FOOD_EMOJIS[lower];
  // Partial match - check if any key is contained in the name
  const keys = Object.keys(FOOD_EMOJIS);
  for (const key of keys) {
    if (lower.includes(key)) return FOOD_EMOJIS[key];
  }
  return "🍽️";
};

function fileToBase64(file) {
  return new Promise((resolve,reject)=>{
    // For non-images (PDF, etc), use direct base64
    if (!file.type.startsWith("image/")) {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        const base64 = result.split(",")[1];
        const mediaType = result.split(";")[0].split(":")[1];
        resolve({base64,mediaType});
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
      return;
    }

    // For images: compress to stay under API limits and improve speed
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        // Calculate new dimensions: max 1600px on longest side
        let { width, height } = img;
        const maxSize = 1600;
        if (width > maxSize || height > maxSize) {
          if (width > height) {
            height = Math.round(height * maxSize / width);
            width = maxSize;
          } else {
            width = Math.round(width * maxSize / height);
            height = maxSize;
          }
        }

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);

        // Try progressively lower quality until under 4MB (safe margin under 5MB limit)
        const tryQuality = (q) => {
          const dataUrl = canvas.toDataURL("image/jpeg", q);
          const base64 = dataUrl.split(",")[1];
          const sizeBytes = base64.length * 0.75; // approximate size
          if (sizeBytes > 4*1024*1024 && q > 0.3) {
            return tryQuality(q - 0.1);
          }
          return {base64, mediaType: "image/jpeg"};
        };

        URL.revokeObjectURL(url);
        resolve(tryQuality(0.85));
      } catch(err) {
        URL.revokeObjectURL(url);
        reject(err);
      }
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("No se pudo cargar la imagen"));
    };
    img.src = url;
  });
}

  (entries||[]).forEach(e => { if (e.totals) Object.keys(t).forEach(k => { t[k] += (e.totals[k]||0); }); });
  return t;
};

function Ring({value,max,size=200,color="#0891b2",thickness=12,children}) {
  const pct = Math.min(1, Math.max(0, value/max));
  const r = (size-thickness)/2;
  const c = 2*Math.PI*r;
  const offset = c * (1-pct);
  return (
    <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg-sunken)" strokeWidth={thickness}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={thickness} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1)",filter:"drop-shadow(0 0 8px "+color+"40)"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        {children}
      </div>
    </div>
  );
}

function MacroRing({label,current,target,color,unit="g",icon,onClick,isLimit}) {
  const pct = target>0?Math.min(1.5,(current/target)):0;
  const over = pct>1.1;
  const short = !isLimit && pct < 0.7 && current > 0;
  const empty = current === 0;
  const r = 26;
  const c = 2*Math.PI*r;
  const offset = c * (1-Math.min(1,pct));

  // Status indicator (small dot)
  let statusColor = "var(--ink-mute)";
  let statusIcon = "";
  if (empty) { statusColor = "var(--ink-mute)"; }
  else if (over) { statusColor = "var(--danger)"; statusIcon = "↑"; }
  else if (short) { statusColor = "var(--warn)"; statusIcon = "↓"; }
  else if (pct >= 0.85) { statusColor = "var(--mint-deep)"; statusIcon = "✓"; }

  return (
    <button onClick={onClick} type="button" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 6px",background:"var(--bg-elev)",borderRadius:18,border:"1px solid var(--line)",cursor:"pointer",WebkitTapHighlightColor:"transparent",touchAction:"manipulation",position:"relative"}}>
      {statusIcon && (
        <div style={{position:"absolute",top:6,right:6,width:16,height:16,borderRadius:"50%",background:statusColor,color:"#fff",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>{statusIcon}</div>
      )}
      <div style={{position:"relative",width:64,height:64}}>
        <svg width="64" height="64" style={{transform:"rotate(-90deg)"}}>
          <circle cx="32" cy="32" r={r} fill="none" stroke="var(--bg-sunken)" strokeWidth="5"/>
          <circle cx="32" cy="32" r={r} fill="none" stroke={over?"var(--danger)":color} strokeWidth="5" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1)"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{icon}</div>
      </div>
      <div style={{fontSize:10,color:"var(--ink-mute)",fontWeight:600,letterSpacing:0.5,textTransform:"uppercase",marginTop:2}}>{label}</div>
      <div style={{fontSize:13,color:over?"var(--danger)":"var(--ink)",fontWeight:700,fontVariantNumeric:"tabular-nums",lineHeight:1}}>
        {Math.round(current)}<span style={{color:"var(--ink-mute)",fontWeight:500}}>/{target}{unit}</span>
      </div>
    </button>
  );
}

function getMacroAdvice(key, current, target, isLimit) {
  const pct = target>0?(current/target):0;
  const tips = MACRO_TIPS[key] || {};
  if (current === 0 && !isLimit) return {status:"empty", title:"Sin registro", color:"var(--ink-mute)", text:tips.empty||"Aún no has registrado nada de este macro hoy."};
  if (isLimit) {
    // sugar, sodium - we want to be UNDER target
    if (pct > 1.1) return {status:"over", title:"Te pasaste", color:"var(--danger)", text:tips.over||"Te pasaste del límite recomendado."};
    if (pct > 0.85) return {status:"close", title:"Cerca del límite", color:"var(--warn)", text:"Estás cerca del límite, cuida lo que comas el resto del día."};
    return {status:"ok", title:"Vas bien", color:"var(--mint-deep)", text:"Vas dentro del rango saludable. Sigue así."};
  } else {
    // protein, carbs, fat, fiber - we want to HIT target
    if (pct > 1.1) return {status:"over", title:"Te pasaste", color:"var(--warn)", text:tips.over||"Te pasaste del objetivo. No es grave si es ocasional."};
    if (pct >= 0.85) return {status:"ok", title:"Excelente", color:"var(--mint-deep)", text:"Llegaste a tu objetivo. Muy bien."};
    if (pct >= 0.5) return {status:"short", title:"Vas a medias", color:"var(--warn)", text:tips.short||"Te falta para llegar a tu objetivo del día."};
    return {status:"low", title:"Te quedas corto", color:"var(--danger)", text:tips.short||"Estás muy abajo del objetivo. Es importante completar este macro."};
  }
}

function WeightChart({history,current,goal,start}) {
  if (!history || history.length < 2) {
    return (
      <div style={{padding:"20px 0",textAlign:"center"}}>
        <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600,letterSpacing:0.5,textTransform:"uppercase"}}>Sin historial todavía</div>
        <div style={{fontSize:12,color:"var(--ink-mute)",marginTop:6,lineHeight:1.5}}>Actualiza tu peso varios días para ver tu progreso</div>
      </div>
    );
  }

  const points = history.slice(-12);
  const weights = points.map(p=>p.weight);
  const minW = Math.min(...weights, goal) - 1;
  const maxW = Math.max(...weights, start||current) + 1;
  const range = maxW - minW || 1;

  const w = 320, h = 130, pad = 24;
  const chartW = w - pad*2;
  const chartH = h - pad*2;

  const xStep = points.length>1 ? chartW/(points.length-1) : 0;
  const yScale = (val) => pad + chartH - ((val-minW)/range)*chartH;

  const linePath = points.map((p,i)=>(i===0?"M":"L")+(pad+i*xStep)+","+yScale(p.weight)).join(" ");
  const areaPath = linePath + " L"+(pad+(points.length-1)*xStep)+","+(pad+chartH)+" L"+pad+","+(pad+chartH)+" Z";

  const goalY = yScale(goal);

  const first = points[0].weight;
  const last = points[points.length-1].weight;
  const diff = (last-first).toFixed(1);
  const isLosing = parseFloat(diff) < 0;
  const isGaining = parseFloat(diff) > 0;

  let projection = "";
  if (points.length >= 3 && isLosing) {
    const daysSpan = (new Date(points[points.length-1].date) - new Date(points[0].date))/86400000;
    if (daysSpan > 0) {
      const ratePerDay = Math.abs(parseFloat(diff))/daysSpan;
      const remaining = current - goal;
      if (ratePerDay > 0 && remaining > 0) {
        const daysToGoal = Math.round(remaining/ratePerDay);
        if (daysToGoal < 2000) {
          projection = daysToGoal < 30 ? "~"+daysToGoal+" días para tu meta" : daysToGoal < 365 ? "~"+Math.round(daysToGoal/30)+" meses para tu meta" : "~"+(daysToGoal/365).toFixed(1)+" años para tu meta";
        }
      }
    }
  }

  return (
    <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--line)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Tu progreso</div>
        <div style={{fontSize:11,fontWeight:700,color:isLosing?"var(--mint-deep)":isGaining?"var(--warn)":"var(--ink-mute)"}}>
          {isLosing?"↓ ":isGaining?"↑ ":""}{Math.abs(parseFloat(diff))}kg
        </div>
      </div>

      <svg width="100%" viewBox={"0 0 "+w+" "+h} style={{display:"block"}} preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="wArea" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor="#06b6d4" stopOpacity="0.25"/>
            <stop offset="100%" stopColor="#06b6d4" stopOpacity="0"/>
          </linearGradient>
        </defs>

        <line x1={pad} y1={goalY} x2={w-pad} y2={goalY} stroke="#10b981" strokeWidth="1.5" strokeDasharray="4,4" opacity="0.6"/>
        <text x={w-pad} y={goalY-5} textAnchor="end" fontSize="10" fill="#0d9488" fontWeight="700">Meta {goal}kg</text>

        <path d={areaPath} fill="url(#wArea)"/>
        <path d={linePath} fill="none" stroke="#0891b2" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>

        {points.map((p,i)=>(
          <circle key={i} cx={pad+i*xStep} cy={yScale(p.weight)} r="3" fill="#fff" stroke="#0891b2" strokeWidth="2"/>
        ))}

        <circle cx={pad+(points.length-1)*xStep} cy={yScale(last)} r="5" fill="#0891b2"/>
        <text x={pad+(points.length-1)*xStep} y={yScale(last)-10} textAnchor={points.length>3?"end":"middle"} fontSize="11" fill="#0a1f1c" fontWeight="700">{last}kg</text>
      </svg>

      {projection && (
        <div style={{marginTop:10,padding:"10px 14px",background:"var(--mint-soft)",borderRadius:12,fontSize:12,color:"var(--mint-deep)",fontWeight:700,textAlign:"center"}}>
          🎯 {projection}
        </div>
      )}
    </div>
  );
}

function WeightStat({current,start,goal,history}) {
  const total = start - goal;
  const lost = start - current;
  const pct = Math.min(100, Math.max(0, total>0?(lost/total)*100:0));
  return (
    <div style={{background:"var(--bg-elev)",border:"1px solid var(--line)",borderRadius:24,padding:20}}>
      <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Peso actual</div>
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginTop:4}}>
            <div className="serif" style={{fontSize:48,color:"var(--ink)",lineHeight:1,fontWeight:400}}>{current}</div>
            <div style={{fontSize:14,color:"var(--ink-soft)",fontWeight:600}}>kg</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Meta</div>
          <div style={{fontSize:18,color:"var(--mint-deep)",fontWeight:800,marginTop:6}}>{goal}<span style={{fontSize:12,color:"var(--ink-mute)",fontWeight:500}}>kg</span></div>
        </div>
      </div>
      <div style={{height:8,background:"var(--bg-sunken)",borderRadius:6,overflow:"hidden",position:"relative"}}>
        <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,var(--mint),var(--primary))",borderRadius:6,transition:"width 1.2s cubic-bezier(0.16,1,0.3,1)",boxShadow:"0 0 12px rgba(8,145,178,0.3)"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:11,color:"var(--ink-mute)",fontWeight:600}}>
        <span>Inicio: {start}kg</span>
        <span style={{color:"var(--primary)"}}>{pct.toFixed(0)}% completado</span>
        <span>Faltan: {Math.max(0,(current-goal).toFixed(1))}kg</span>
      </div>
      <WeightChart history={history} current={current} goal={goal} start={start}/>
    </div>
  );
}

  const [step,setStep] = React.useState(0);
  const [data,setData] = React.useState(initial||{name:"",sex:"",age:"",height:"",weight:"",goalWeight:"",activity:"light",restrictions:"",medications:"",notes:""});

    onSave({...data,age:parseInt(data.age)||30,height:parseFloat(data.height)||170,weight:parseFloat(data.weight)||80,goalWeight:parseFloat(data.goalWeight)||70,startWeight:initial?initial.startWeight:parseFloat(data.weight)||80});

        <div style={{display:"flex",gap:10,marginTop:18}}>

            <button type="button" onClick={()=>{
              if(canNext()){setStep(s=>s+1);}
              else{
                let msg="Falta llenar: ";
                const missing=[];
                if(step===0){if(!data.name.trim())missing.push("nombre");if(!data.sex)missing.push("sexo");if(!String(data.age||"").trim())missing.push("edad");}
                if(step===1){if(!String(data.height||"").trim())missing.push("estatura");if(!String(data.weight||"").trim())missing.push("peso");if(!String(data.goalWeight||"").trim())missing.push("meta");}
                if(step===2){if(!data.activity)missing.push("nivel de actividad");}
                alert(msg+missing.join(", "));

          )}
        </div>
      </div>
    </div>
  );
}

    try {

      for (const file of files) {
        if (file.size > 10*1024*1024) {
          setError("Una foto pasa los 10MB");
          continue;
        }
        const result = await fileToBase64(file);
        newPhotos.push({...result, preview: URL.createObjectURL(file), id: Math.random().toString(36).slice(2,8)});
      }
      setPhotos(prev => [...prev, ...newPhotos]);
      setError("");
      if (cameraRef.current) cameraRef.current.value = "";
      if (galleryRef.current) galleryRef.current.value = "";
    } catch(err) {
      setError("Error cargando fotos");
    }
  };

    setPhotos(prev => prev.filter(p => p.id !== id));
  };

  const clearPhotos = () => {
    setPhotos([]);
    if (cameraRef.current) cameraRef.current.value = "";
    if (galleryRef.current) galleryRef.current.value = "";
  };

  const analyze = async () => {
    if (inputMode==="text" && !text.trim()) return;
    if (inputMode==="photo" && photos.length===0) return;
    if (!apiKey) { askKey(); return; }
    setLoading(true); setError("");
    let resp = "";
    try {
      if (inputMode==="photo") {
        const multiContext = photos.length>1 ? "Estás viendo "+photos.length+" fotos relacionadas a UNA SOLA comida (ej: el alimento, su empaque, la información nutrimental, ingredientes). Combina toda la información visible para hacer un análisis preciso. " : "";
        const photoPrompt = multiContext+"Analiza la(s) foto(s). Identifica TODOS los alimentos, lee etiquetas nutrimentales si las hay, estima porciones realistas y calcula valores nutricionales precisos. " + (text.trim() ? "Contexto adicional del usuario: "+text : "");
        if (photos.length === 1) {
          resp = await apiVision(apiKey, FOOD_LOG_PROMPT, photoPrompt+" (Comida de "+meal+")", photos[0].base64, photos[0].mediaType, 2500);
        } else {
          resp = await apiVisionMulti(apiKey, FOOD_LOG_PROMPT, photoPrompt+" (Comida de "+meal+")", photos, 2500);
        }
      } else {
        resp = await api(apiKey, FOOD_LOG_PROMPT, [{role:"user",content:"Analiza ("+meal+"): "+text}], 1500);
      }
      // Robust JSON extraction - find the first { and last }
      let jsonStr = resp.replace(/```json|```/g,"").trim();
      const firstBrace = jsonStr.indexOf("{");
      const lastBrace = jsonStr.lastIndexOf("}");
      if (firstBrace >= 0 && lastBrace > firstBrace) {
        jsonStr = jsonStr.substring(firstBrace, lastBrace+1);
      }
      const json = JSON.parse(jsonStr);
      setParsed({...json,meal,originalText:inputMode==="photo"?(text.trim()||(photos.length>1?photos.length+" fotos":"Foto del plato")):text,hasPhoto:inputMode==="photo",photoCount:photos.length});
    } catch(e) {
      console.error("Food analyze error:", e, "Response:", resp);
      setError("No pude analizar. Detalle: "+e.message.slice(0,100)+". Intenta de nuevo.");
    }
    setLoading(false);
  };

  const save = () => {
    if (!parsed) return;

    <div className="fadeIn" style={{position:"fixed",inset:0,background:"rgba(10,31,28,0.4)",backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

        </div>

        <label style={{fontSize:11,color:"var(--ink-mute)",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:10,display:"block"}}>Tipo</label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>

              <div style={{fontSize:20,marginBottom:4}}>{MEAL_ICONS[m]}</div>
              {m}

        </div>

        {!parsed && (
          <>
            <div style={{display:"flex",gap:6,marginBottom:16,padding:4,background:"var(--bg-sunken)",borderRadius:12}}>
              <button type="button" onClick={()=>{setInputMode("photo");}} style={{flex:1,padding:"10px 0",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:inputMode==="photo"?"var(--bg-elev)":"transparent",color:inputMode==="photo"?"var(--ink)":"var(--ink-mute)",transition:"all 0.2s",boxShadow:inputMode==="photo"?"0 2px 6px rgba(0,0,0,0.05)":"none",WebkitTapHighlightColor:"transparent"}}>📷 Foto</button>
              <button type="button" onClick={()=>{setInputMode("text");clearPhoto();}} style={{flex:1,padding:"10px 0",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:inputMode==="text"?"var(--bg-elev)":"transparent",color:inputMode==="text"?"var(--ink)":"var(--ink-mute)",transition:"all 0.2s",boxShadow:inputMode==="text"?"0 2px 6px rgba(0,0,0,0.05)":"none",WebkitTapHighlightColor:"transparent"}}>✍️ Escribir</button>
            </div>

            {inputMode==="photo" && (
              <div style={{marginBottom:16}}>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

                      <button type="button" onClick={()=>cameraRef.current&&cameraRef.current.click()} disabled={photos.length>=8} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid var(--line)",background:"var(--bg-elev)",cursor:photos.length>=8?"not-allowed":"pointer",fontSize:12,fontWeight:700,color:"var(--primary)",WebkitTapHighlightColor:"transparent"}}>📸 Cámara</button>
                      <button type="button" onClick={clearPhotos} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid var(--line)",background:"var(--bg-elev)",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--ink-mute)",WebkitTapHighlightColor:"transparent"}}>Limpiar todo</button>
                    </div>
                    <div style={{fontSize:11,color:"var(--ink-mute)",textAlign:"center",marginBottom:8,fontWeight:500}}>{photos.length} {photos.length===1?"foto":"fotos"} · Tip: agrega etiqueta nutrimental para más precisión</div>
                  </>
                )}

                <label style={{fontSize:11,color:"var(--ink-mute)",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginTop:14,marginBottom:8,display:"block"}}>Nota opcional</label>
                <textarea rows={2} value={text} onChange={e=>setText(e.target.value)}
                  placeholder="Ej: '250ml de leche', '1 scoop de proteína', 'porción grande'..."
                  style={{width:"100%",background:"var(--bg-elev)",border:"1.5px solid var(--line)",borderRadius:14,padding:"12px 14px",color:"var(--ink)",fontSize:14,resize:"none",outline:"none",lineHeight:1.5,fontFamily:"inherit"}}/>
              </div>
            )}

            {inputMode==="text" && (
              <>
                <label style={{fontSize:11,color:"var(--ink-mute)",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:10,display:"block"}}>Qué comiste? Incluye porciones</label>
                <textarea rows={4} value={text} onChange={e=>setText(e.target.value)}
                  placeholder="Ej: 2 huevos revueltos con jamón, 1 rebanada de pan tostado con mantequilla, 1 café con leche..."
                  style={{width:"100%",background:"var(--bg-elev)",border:"1.5px solid var(--line)",borderRadius:16,padding:"15px 17px",color:"var(--ink)",fontSize:15,resize:"none",outline:"none",lineHeight:1.6,marginBottom:16,fontFamily:"inherit",transition:"all 0.2s"}}/>
              </>
            )}

            <button onClick={analyze} disabled={(inputMode==="text"?!text.trim():photos.length===0)||loading} style={{width:"100%",padding:16,background:(inputMode==="text"?!text.trim():photos.length===0)||loading?"var(--bg-sunken)":"linear-gradient(135deg,var(--mint),var(--primary))",border:"none",borderRadius:16,color:(inputMode==="text"?!text.trim():photos.length===0)||loading?"var(--ink-mute)":"#fff",fontSize:15,fontWeight:700,cursor:(inputMode==="text"?!text.trim():photos.length===0)||loading?"not-allowed":"pointer",letterSpacing:0.3,boxShadow:(inputMode==="text"?!text.trim():photos.length===0)||loading?"none":"0 8px 24px -8px rgba(16,185,129,0.5)"}}>
              {loading ? (inputMode==="photo"?"Analizando "+photos.length+(photos.length===1?" foto…":" fotos…"):"Analizando…") : "Analizar"}
            </button>
          </>
        )}

        {error && <div style={{color:"var(--danger)",fontSize:13,marginTop:10,textAlign:"center",padding:12,background:"rgba(239,68,68,0.08)",borderRadius:12,border:"1px solid rgba(239,68,68,0.2)"}}>{error}</div>}

        {parsed && (
          <div className="fade" style={{marginTop:14}}>
            <div style={{background:"linear-gradient(135deg,rgba(16,185,129,0.06),rgba(8,145,178,0.04))",border:"1px solid var(--mint-soft)",borderRadius:20,padding:20}}>
              <div style={{fontSize:11,color:"var(--mint-deep)",letterSpacing:1.5,fontWeight:700,marginBottom:14,textTransform:"uppercase"}}>✓ Análisis {parsed.hasPhoto?"de foto":""}</div>

              {parsed.items && parsed.items.map((it,i)=>(
                <div key={i} style={{padding:"12px 0",borderBottom:i<parsed.items.length-1?"1px solid var(--line)":"none",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:12,background:"var(--bg-sunken)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{getFoodEmoji(it.name)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,color:"var(--ink)",marginBottom:3,fontWeight:600}}>{it.name}</div>
                    <div style={{fontSize:12,color:"var(--ink-mute)"}}>{it.portion} · <strong style={{color:"var(--primary)"}}>{it.kcal}kcal</strong> · P:{it.protein}g · C:{it.carbs}g · G:{it.fat}g</div>
                  </div>
                </div>
              ))}

              <div style={{marginTop:16,padding:"16px 18px",background:"var(--bg-elev)",borderRadius:14,border:"1px solid var(--line)"}}>
                <div style={{fontSize:11,color:"var(--ink-mute)",letterSpacing:1.5,fontWeight:700,marginBottom:12,textTransform:"uppercase"}}>Total</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
                  <div><div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600}}>Calorías</div><div className="serif" style={{fontSize:32,color:"var(--primary)",lineHeight:1,marginTop:2}}>{parsed.totals.kcal}</div></div>
                  <div><div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600}}>Proteína</div><div style={{fontSize:18,fontWeight:700,marginTop:6}}>{parsed.totals.protein}<span style={{fontSize:11,color:"var(--ink-mute)"}}>g</span></div></div>
                  <div><div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600}}>Carbos</div><div style={{fontSize:18,fontWeight:700,marginTop:6}}>{parsed.totals.carbs}<span style={{fontSize:11,color:"var(--ink-mute)"}}>g</span></div></div>
                  <div><div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600}}>Grasas</div><div style={{fontSize:18,fontWeight:700,marginTop:6}}>{parsed.totals.fat}<span style={{fontSize:11,color:"var(--ink-mute)"}}>g</span></div></div>
                  <div><div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600}}>Azúcar</div><div style={{fontSize:18,fontWeight:700,marginTop:6}}>{parsed.totals.sugar}<span style={{fontSize:11,color:"var(--ink-mute)"}}>g</span></div></div>
                  <div><div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600}}>Fibra</div><div style={{fontSize:18,fontWeight:700,marginTop:6}}>{parsed.totals.fiber}<span style={{fontSize:11,color:"var(--ink-mute)"}}>g</span></div></div>
                </div>
              </div>

              {parsed.summary && <div style={{marginTop:14,fontSize:13,color:"var(--ink-soft)",fontStyle:"italic",lineHeight:1.5,padding:"12px 0 0"}}>"{parsed.summary}"</div>}
            </div>

            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>{setParsed(null);}} style={{flex:1,padding:14,background:"var(--bg-elev)",border:"1.5px solid var(--line)",borderRadius:14,color:"var(--ink-soft)",fontSize:13,cursor:"pointer",fontWeight:700}}>Editar</button>
              <button onClick={save} style={{flex:2,padding:14,background:"linear-gradient(135deg,var(--mint),var(--primary))",border:"none",borderRadius:14,color:"#fff",fontSize:14,cursor:"pointer",fontWeight:700,boxShadow:"0 6px 16px -4px rgba(16,185,129,0.4)"}}>Guardar</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────

function App() {
  const [profile,setProfile] = React.useState(()=>{ try { return JSON.parse(localStorage.getItem("mc_profile"))||null; } catch(e){return null;} });

  const [editKg,setEditKg] = React.useState(false);
  const [tmpKg,setTmpKg] = React.useState("");

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      }).catch(()=>{});
    }
  },[]);
  const [recipeCategory,setRecipeCategory] = React.useState("desayuno");

  const [waterLog,setWaterLog] = React.useState(()=>{ try { return JSON.parse(localStorage.getItem("mc_water_log"))||{}; } catch(e){return {};} });
  const [weeklyReport,setWeeklyReport] = React.useState(()=>{ try { return JSON.parse(localStorage.getItem("mc_weekly_report"))||null; } catch(e){return null;} });
  const [generatingReport,setGeneratingReport] = React.useState(false);

  const [cin,setCin] = React.useState("");

      } else {
        const msgs = nc.slice(-10).map(m=>({role:m.r==="u"?"user":"assistant",content:m.t}));
        // Streaming with Haiku for fastest response
        const r = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({
            model:"claude-haiku-4-5-20251001",
            max_tokens:1000,
            system:sysPrompt+"\n\nTienes acceso a la herramienta web_search. ÚSALA cuando el usuario pregunte por información actual: noticias, datos recientes, marcas/productos específicos, precios, estudios nuevos, recetas que no conozcas, restaurantes, etc. Cuando uses la herramienta, integra la información naturalmente en tu respuesta sin mencionar que buscaste.",

          })
        });

        if (!r.ok) {
          const errBody = await r.text();
          throw new Error("API error: "+errBody.slice(0,200));
        }

        // Add empty assistant message that we'll fill as stream comes
        setChat(m=>[...m,{r:"a",t:""}]);
        responseText = "";

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, {stream:true});
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = line.slice(6).trim();
            if (!data || data === "[DONE]") continue;
            try {
              const parsed = JSON.parse(data);
              // Handle text deltas
              if (parsed.type === "content_block_delta" && parsed.delta && parsed.delta.type === "text_delta" && parsed.delta.text) {
                responseText += parsed.delta.text;
                setChat(m => {
                  const updated = [...m];
                  if (updated.length > 0 && updated[updated.length-1].r === "a") {
                    updated[updated.length-1] = {...updated[updated.length-1], t: responseText};
                  }
                  return updated;
                });
              }
              // Show "Buscando en internet..." indicator when web_search starts
              if (parsed.type === "content_block_start" && parsed.content_block && parsed.content_block.type === "server_tool_use" && parsed.content_block.name === "web_search") {
                setChat(m => {
                  const updated = [...m];
                  if (updated.length > 0 && updated[updated.length-1].r === "a") {
                    const currentText = updated[updated.length-1].t;

                      updated[updated.length-1] = {...updated[updated.length-1], t: currentText + (currentText ? "\n\n" : "") + "🔍 Buscando información actualizada..."};
                    }
                  }
                  return updated;
                });
              }
              // When search results come back, clean up the searching indicator

                setChat(m => {
                  const updated = [...m];
                  if (updated.length > 0 && updated[updated.length-1].r === "a") {
                    const cleaned = updated[updated.length-1].t.replace(/🔍 Buscando información actualizada\.\.\.\s*/g, "");

                      updated[updated.length-1] = {...updated[updated.length-1], t: cleaned};
                      responseText = cleaned;
                    }
                  }
                  return updated;
                });
              }
              if (parsed.type === "error") {
                throw new Error(parsed.error?.message || "Stream error");
              }
            } catch(parseErr) {
              if (parseErr.message?.includes("Stream error")) throw parseErr;
              // Ignore JSON parse errors for partial data
            }

            <button key={id} onClick={()=>{setTab(id);if(id==="today")setSelectedDate(todayKey());}} style={{padding:"10px 14px 12px",border:"none",cursor:"pointer",fontSize:14,fontWeight:600,background:"transparent",color:tab===id?"var(--ink)":"var(--ink-mute)",position:"relative",whiteSpace:"nowrap",letterSpacing:-0.2}}>
              {lb}
              {tab===id && <div style={{position:"absolute",bottom:-1,left:14,right:14,height:2,background:"linear-gradient(90deg,var(--primary),var(--mint))",borderRadius:2}}/>}
            </button>
          ))}
        </div>
      </div>

      {/* TAB: TODAY */}
      {tab==="today" && (
        <div className="fade" style={{padding:"20px 20px 100px",maxWidth:640,margin:"0 auto"}}>

          {/* WEIGHT STAT */}
          <div onClick={()=>{setEditKg(true);setTmpKg(String(profile.weight));}} style={{cursor:"pointer",marginBottom:14}}>
            {editKg ? (
              <div style={{...card,padding:20}}>
                <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Actualizar peso</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input type="number" value={tmpKg} onChange={e=>setTmpKg(e.target.value)} autoFocus
                    onKeyDown={e=>{if(e.key==="Enter"){const v=parseFloat(tmpKg);if(!isNaN(v)&&v>30&&v<300)updateWeight(v);setEditKg(false);}}}
                    style={{flex:1,background:"var(--bg-elev)",border:"1.5px solid var(--primary)",borderRadius:12,padding:"12px 14px",color:"var(--primary)",fontSize:24,fontWeight:700,outline:"none",fontFamily:"inherit"}}/>
                  <button onClick={(e)=>{e.stopPropagation();const v=parseFloat(tmpKg);if(!isNaN(v)&&v>30&&v<300)updateWeight(v);setEditKg(false);}} style={{background:"linear-gradient(135deg,var(--primary),var(--mint))",border:"none",borderRadius:12,padding:"12px 18px",color:"#fff",fontWeight:700,cursor:"pointer"}}>OK</button>
                </div>
              </div>
            ) : (
              <WeightStat current={profile.weight} start={profile.startWeight} goal={profile.goalWeight} history={weightHistory}/>
            )}
          </div>

          {/* WATER TRACKER */}
          <div style={{...card,padding:18}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:22}}>💧</div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"var(--ink)"}}>Agua</div>
                  <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:500}}>Meta: {waterGoal}L ({Math.round(waterGoal*1000)}ml)</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="serif" style={{fontSize:28,color:todayWater>=waterGoal*1000?"var(--mint-deep)":"var(--primary)",lineHeight:1}}>{(todayWater/1000).toFixed(1)}</div>
                <div style={{fontSize:10,color:"var(--ink-mute)",fontWeight:600}}>litros hoy</div>
              </div>
            </div>
            <div style={{height:7,background:"var(--bg-sunken)",borderRadius:6,overflow:"hidden",marginBottom:12}}>
              <div style={{height:"100%",width:Math.min(100,(todayWater/(waterGoal*1000))*100)+"%",background:"linear-gradient(90deg,#38bdf8,var(--primary))",borderRadius:6,transition:"width 0.8s cubic-bezier(0.16,1,0.3,1)"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {[{ml:150,icon:"🥛",label:"Vaso"},{ml:250,icon:"🥤",label:"Taza"},{ml:500,icon:"🍶",label:"Botella"},{ml:-200,icon:"↩",label:"Quitar"}].map(({ml,icon,label})=>(
                <button key={ml} type="button" onClick={()=>addWater(ml)} style={{padding:"10px 4px",borderRadius:12,border:"1.5px solid var(--line)",background:ml<0?"var(--bg-sunken)":"var(--bg-elev)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}>
                  <div style={{fontSize:18}}>{icon}</div>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--ink)"}}>{label}</div>
                  <div style={{fontSize:9,color:"var(--ink-mute)"}}>{ml>0?"+"+ml+"ml":ml+"ml"}</div>
                </button>
              ))}
            </div>
            {todayWater>=waterGoal*1000 && (
              <div style={{marginTop:10,padding:"8px 12px",background:"var(--mint-soft)",borderRadius:10,fontSize:12,color:"var(--mint-deep)",fontWeight:700,textAlign:"center"}}>✓ Meta de agua alcanzada 🎉</div>
            )}
          </div>

          {/* DAILY MENU SUGGESTION */}
          <div style={{...card,padding:0,overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:dailyMenu && dailyMenu.date===todayKey()?"1px solid var(--line)":"none",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:34,height:34,borderRadius:11,background:"linear-gradient(135deg,var(--mint),var(--primary))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🍽️</div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"var(--ink)"}}>Menú del día</div>
                  <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:500}}>Sugerido para tu meta</div>
                </div>
              </div>
              <button onClick={generateDailyMenu} disabled={generatingMenu} style={{background:"var(--bg-sunken)",border:"1px solid var(--line)",borderRadius:10,padding:"6px 12px",color:"var(--primary)",fontSize:11,fontWeight:700,cursor:generatingMenu?"wait":"pointer",letterSpacing:0.3,WebkitTapHighlightColor:"transparent"}}>
                {generatingMenu?"...":dailyMenu && dailyMenu.date===todayKey()?"↻ Otro":"Generar"}
              </button>
            </div>

            {generatingMenu && (
              <div style={{padding:"30px 20px",textAlign:"center"}}>
                <Dots/>
                <div style={{fontSize:12,color:"var(--ink-mute)",marginTop:10,fontWeight:500}}>Diseñando tu menú del día…</div>
              </div>
            )}

            {!generatingMenu && dailyMenu && dailyMenu.date===todayKey() && (
              <div style={{padding:"4px 18px 16px"}}>
                {dailyMenu.summary && (
                  <div style={{fontSize:13,color:"var(--ink-soft)",fontStyle:"italic",lineHeight:1.5,padding:"12px 0",borderBottom:"1px solid var(--line)"}}>"{dailyMenu.summary}"</div>
                )}

                {dailyMenu.meals && dailyMenu.meals.map((m,i)=>(
                  <div key={i} style={{padding:"14px 0",borderBottom:i<dailyMenu.meals.length-1?"1px solid var(--line)":"none"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                      <div style={{width:38,height:38,borderRadius:11,background:"var(--bg-sunken)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{m.emoji||"🍽️"}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10,color:"var(--primary-deep)",letterSpacing:1.2,fontWeight:800,textTransform:"uppercase"}}>{m.type}</div>
                        <div style={{fontSize:14,color:"var(--ink)",fontWeight:700,marginTop:2,lineHeight:1.3}}>{m.name}</div>
                        {m.description && <div style={{fontSize:12,color:"var(--ink-mute)",marginTop:4,lineHeight:1.4}}>{m.description}</div>}
                        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                          <span style={{fontSize:10,color:"var(--primary-deep)",background:"var(--primary-soft)",padding:"2px 7px",borderRadius:6,fontWeight:700}}>{m.kcal}kcal</span>
                          <span style={{fontSize:10,color:"var(--mint-deep)",background:"var(--mint-soft)",padding:"2px 7px",borderRadius:6,fontWeight:700}}>P {m.protein}g</span>
                          <span style={{fontSize:10,color:"var(--ink-soft)",background:"var(--bg-sunken)",padding:"2px 7px",borderRadius:6,fontWeight:600}}>C {m.carbs}g</span>
                          <span style={{fontSize:10,color:"var(--ink-soft)",background:"var(--bg-sunken)",padding:"2px 7px",borderRadius:6,fontWeight:600}}>G {m.fat}g</span>
                        </div>
                        {m.ingredients && m.ingredients.length>0 && (
                          <div style={{marginTop:10,padding:"10px 12px",background:"var(--bg-sunken)",borderRadius:10}}>
                            <div style={{fontSize:9,color:"var(--ink-mute)",fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Ingredientes</div>
                            <div style={{display:"flex",flexDirection:"column",gap:3}}>
                              {m.ingredients.map((ing,j)=>(
                                <div key={j} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--ink)"}}>
                                  <div style={{width:4,height:4,borderRadius:"50%",background:"var(--mint)",flexShrink:0}}/>
                                  <div style={{flex:1,lineHeight:1.4}}>{ing}</div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                        {m.highlight && (
                          <div style={{fontSize:11,color:"var(--mint-deep)",marginTop:8,fontWeight:600,fontStyle:"italic"}}>💡 {m.highlight}</div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}

                {dailyMenu.shoppingList && dailyMenu.shoppingList.length>0 && (
                  <div style={{marginTop:14,padding:"14px 16px",background:"linear-gradient(135deg,rgba(16,185,129,0.06),rgba(8,145,178,0.04))",border:"1px solid var(--mint-soft)",borderRadius:14}}>
                    <div style={{fontSize:10,color:"var(--mint-deep)",letterSpacing:1.2,fontWeight:800,textTransform:"uppercase",marginBottom:10}}>🛒 Lista de compras del día</div>
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      {dailyMenu.shoppingList.map((item,j)=>(
                        <div key={j} style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"var(--ink)"}}>
                          <div style={{width:14,height:14,borderRadius:4,border:"1.5px solid var(--mint)",flexShrink:0}}/>
                          <div style={{flex:1,lineHeight:1.4}}>{item}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {dailyMenu.totals && (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginTop:14,padding:"14px 0 0",borderTop:"1px solid var(--line)"}}>
                    <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"var(--ink-mute)",fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>Total</div><div style={{fontSize:16,color:"var(--primary)",fontWeight:800,marginTop:3}}>{dailyMenu.totals.kcal}<span style={{fontSize:9,color:"var(--ink-mute)"}}>kcal</span></div></div>
                    <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"var(--ink-mute)",fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>Prot</div><div style={{fontSize:16,color:"var(--mint-deep)",fontWeight:800,marginTop:3}}>{dailyMenu.totals.protein}<span style={{fontSize:9,color:"var(--ink-mute)"}}>g</span></div></div>
                    <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"var(--ink-mute)",fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>Carb</div><div style={{fontSize:16,color:"var(--ink)",fontWeight:800,marginTop:3}}>{dailyMenu.totals.carbs}<span style={{fontSize:9,color:"var(--ink-mute)"}}>g</span></div></div>
                    <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"var(--ink-mute)",fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>Gras</div><div style={{fontSize:16,color:"var(--ink)",fontWeight:800,marginTop:3}}>{dailyMenu.totals.fat}<span style={{fontSize:9,color:"var(--ink-mute)"}}>g</span></div></div>
                  </div>
                )}

                {dailyMenu.tips && dailyMenu.tips.length>0 && (
                  <div style={{marginTop:16,padding:"14px 16px",background:"linear-gradient(135deg,rgba(245,158,11,0.06),rgba(245,158,11,0.02))",border:"1px solid rgba(245,158,11,0.18)",borderRadius:14}}>
                    <div style={{fontSize:10,color:"#d97706",letterSpacing:1.2,fontWeight:800,textTransform:"uppercase",marginBottom:8}}>💡 Tips de hoy</div>
                    {dailyMenu.tips.map((t,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"4px 0"}}>
                        <div style={{width:5,height:5,borderRadius:"50%",background:"#d97706",marginTop:8,flexShrink:0}}/>
                        <div style={{flex:1,fontSize:13,color:"var(--ink)",lineHeight:1.5}}>{t}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {!generatingMenu && (!dailyMenu || dailyMenu.date!==todayKey()) && (
              <div style={{padding:"22px 20px",textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>🍳</div>
                <div style={{fontSize:13,color:"var(--ink)",fontWeight:600,marginBottom:4}}>Tu menú personalizado</div>
                <div style={{fontSize:11,color:"var(--ink-mute)",lineHeight:1.5,maxWidth:300,margin:"0 auto"}}>Toca "Generar" para que la IA arme un menú completo basado en tus metas, lo que comiste hoy y tus preferencias.</div>
              </div>
            )}
          </div>

          {/* MINI COACH */}
          <div style={{...card,padding:0,overflow:"hidden"}}>
            <div style={{padding:"14px 18px 10px",borderBottom:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,var(--primary),var(--mint))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🧠</div>
                <div style={{fontSize:13,fontWeight:700,color:"var(--ink)"}}>Coach</div>
              </div>
              <button onClick={()=>setTab("chat")} style={{fontSize:11,color:"var(--primary)",fontWeight:700,background:"none",border:"none",cursor:"pointer",padding:"4px 8px"}}>Ver todo ›</button>
            </div>
            <div style={{padding:"12px 18px 14px",display:"flex",gap:10,alignItems:"flex-end"}}>
              <textarea rows={2} value={cin} onChange={e=>setCin(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();setTab("chat");sendChat();}}}
                placeholder="Pregunta algo rápido…"
                style={{flex:1,background:"var(--bg-sunken)",border:"1.5px solid var(--line)",borderRadius:12,padding:"10px 12px",color:"var(--ink)",fontSize:14,resize:"none",outline:"none",lineHeight:1.5,fontFamily:"inherit"}}/>
              <button onClick={()=>{setTab("chat");sendChat();}} disabled={!cin.trim()||cL} style={{background:!cin.trim()||cL?"var(--bg-sunken)":"linear-gradient(135deg,var(--primary),var(--mint))",border:"none",borderRadius:12,padding:"10px 14px",color:!cin.trim()||cL?"var(--ink-mute)":"#fff",fontSize:16,cursor:!cin.trim()||cL?"not-allowed":"pointer",flexShrink:0}}>↑</button>
            </div>
          </div>

          {/* STREAK */}
          {calcStreak()>0 && (
            <div style={{...card,padding:16,background:"linear-gradient(135deg,#fff7ed,#ffedd5)",border:"1px solid #fed7aa",display:"flex",alignItems:"center",gap:14}}>
              <div style={{fontSize:32}} className="float">🔥</div>
              <div>
                <div style={{fontSize:18,color:"#c2410c",fontWeight:800,lineHeight:1}}>{calcStreak()} {calcStreak()===1?"día":"días"}</div>
                <div style={{fontSize:12,color:"#9a3412",marginTop:2,fontWeight:500}}>de racha activa</div>
              </div>
            </div>
          )}

          {/* Weekly report button */}
          <button onClick={()=>{if(weeklyReport && !generatingReport){setShowReport(true);}else{generateWeeklyReport();}}} disabled={generatingReport} style={{...card,padding:16,width:"100%",cursor:generatingReport?"wait":"pointer",border:"1px solid var(--line)",background:"linear-gradient(135deg,rgba(8,145,178,0.06),rgba(16,185,129,0.04))",display:"flex",alignItems:"center",gap:14,WebkitTapHighlightColor:"transparent",touchAction:"manipulation",textAlign:"left"}}>
            <div style={{width:46,height:46,borderRadius:14,background:"linear-gradient(135deg,var(--primary),var(--mint))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:"#fff",flexShrink:0,boxShadow:"0 4px 12px -4px rgba(8,145,178,0.4)"}}>📊</div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,color:"var(--ink)",fontWeight:700,lineHeight:1.2}}>{generatingReport?"Generando reporte…":weeklyReport?"Mi reporte semanal":"Generar reporte semanal"}</div>
              <div style={{fontSize:12,color:"var(--ink-mute)",marginTop:3,fontWeight:500}}>{generatingReport?"Analizando últimos 7 días":weeklyReport?"Toca para ver tu análisis":"IA analiza tus últimos 7 días"}</div>
            </div>
            <div style={{fontSize:18,color:"var(--ink-mute)"}}>›</div>
          </button>

          {/* CALORIES RING */}
          <div style={{...card,padding:28,textAlign:"center"}}>
            <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:18}}>Calorías hoy</div>
            <Ring value={Math.round(todayTotals.kcal)} max={profData.target} size={220} color={remaining<0?"var(--danger)":"var(--primary)"} thickness={14}>
              <div className="serif" style={{fontSize:64,color:remaining<0?"var(--danger)":"var(--ink)",lineHeight:0.9,fontWeight:400}}>{Math.round(todayTotals.kcal)}</div>
              <div style={{fontSize:13,color:"var(--ink-mute)",fontWeight:600,marginTop:4}}>de {profData.target}</div>
            </Ring>
            <div style={{marginTop:20,padding:"12px 20px",background:remaining<0?"rgba(239,68,68,0.08)":"var(--mint-soft)",borderRadius:16,fontSize:13,fontWeight:700,color:remaining<0?"var(--danger)":"var(--mint-deep)",display:"inline-block"}}>
              {remaining > 0 ? `${Math.round(remaining)} kcal restantes` : `${Math.abs(Math.round(remaining))} kcal sobre el límite`}
            </div>
          </div>

          {/* MACROS BENTO GRID */}
          {dayEntries.length>0 && (
            <div style={card}>
              <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:16}}>
                <div className="serif" style={{fontSize:24,color:"var(--ink)"}}>Macros</div>
                <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600,letterSpacing:0.5,textTransform:"uppercase"}}>Distribución</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                <MacroRing label="Proteína" icon="🫘" current={todayTotals.protein} target={macroTargets.protein} color="var(--mint)" onClick={()=>setMacroDetail({key:"protein",label:"Proteína",icon:"🫘",current:todayTotals.protein,target:macroTargets.protein,unit:"g",isLimit:false})}/>
                <MacroRing label="Carbos" icon="🍞" current={todayTotals.carbs} target={macroTargets.carbs} color="var(--primary)" onClick={()=>setMacroDetail({key:"carbs",label:"Carbohidratos",icon:"🍞",current:todayTotals.carbs,target:macroTargets.carbs,unit:"g",isLimit:false})}/>
                <MacroRing label="Grasas" icon="🥑" current={todayTotals.fat} target={macroTargets.fat} color="var(--warn)" onClick={()=>setMacroDetail({key:"fat",label:"Grasas",icon:"🥑",current:todayTotals.fat,target:macroTargets.fat,unit:"g",isLimit:false})}/>
                <MacroRing label="Azúcar" icon="🍯" current={todayTotals.sugar} target={macroTargets.sugar} color="#f59e0b" isLimit={true} onClick={()=>setMacroDetail({key:"sugar",label:"Azúcar",icon:"🍯",current:todayTotals.sugar,target:macroTargets.sugar,unit:"g",isLimit:true})}/>
                <MacroRing label="Fibra" icon="🌾" current={todayTotals.fiber} target={macroTargets.fiber} color="var(--mint-deep)" onClick={()=>setMacroDetail({key:"fiber",label:"Fibra",icon:"🌾",current:todayTotals.fiber,target:macroTargets.fiber,unit:"g",isLimit:false})}/>
                <MacroRing label="Sodio" icon="🧂" current={todayTotals.sodium} target={2300} unit="mg" color="var(--ink-soft)" isLimit={true} onClick={()=>setMacroDetail({key:"sodium",label:"Sodio",icon:"🧂",current:todayTotals.sodium,target:2300,unit:"mg",isLimit:true})}/>
              </div>
            </div>
          )}

          {/* ALERTS */}
          {alerts.length>0 && (
            <div style={{marginBottom:14}}>
              {alerts.map((a,i)=>(
                <div key={i} className="fade" style={{
                  background:a.type==="high"?"rgba(239,68,68,0.05)":"rgba(245,158,11,0.05)",
                  border:a.type==="high"?"1px solid rgba(239,68,68,0.2)":"1px solid rgba(245,158,11,0.2)",
                  borderRadius:16,padding:"14px 16px",marginBottom:8,fontSize:13,color:a.type==="high"?"var(--danger)":"var(--warn)",lineHeight:1.5,fontWeight:600,display:"flex",alignItems:"center",gap:10
                }}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:a.type==="high"?"var(--danger)":"var(--warn)",flexShrink:0}}/>
                  {a.text}
                </div>
              ))}
            </div>
          )}

          {/* MEALS LIST */}
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
              <div className="serif" style={{fontSize:24,color:"var(--ink)"}}>Hoy</div>
              <button onClick={()=>setShowFoodModal(true)} style={{background:"linear-gradient(135deg,var(--mint),var(--primary))",border:"none",borderRadius:12,padding:"8px 16px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:0.3,boxShadow:"0 4px 14px -4px rgba(16,185,129,0.4)"}}>+ Agregar</button>
            </div>

            {dayEntries.length===0 ? (
              <div style={{textAlign:"center",padding:"40px 16px"}}>
                <div style={{fontSize:48,marginBottom:12,opacity:0.3}}>🍽️</div>
                <div style={{fontSize:15,color:"var(--ink-soft)",fontWeight:600,marginBottom:4}}>Sin comidas registradas</div>
                <div style={{fontSize:13,color:"var(--ink-mute)"}}>Toca "Agregar" para empezar tu día</div>
              </div>
            ) : (
              dayEntries.sort((a,b)=>a.timestamp-b.timestamp).map(entry => (
                <div key={entry.id} className="fade tap-effect" style={{padding:"14px 0",borderBottom:"1px solid var(--line)",display:"flex",gap:14,cursor:"pointer"}}>
                  <div style={{fontSize:24,flexShrink:0,width:42,height:42,borderRadius:12,background:"var(--bg-sunken)",display:"flex",alignItems:"center",justifyContent:"center"}}>{entry.items && entry.items.length>0 ? getFoodEmoji(entry.items[0].name) : MEAL_ICONS[entry.meal]||"🍽️"}</div>

        const pct = macroDetail.target>0?Math.round((macroDetail.current/macroDetail.target)*100):0;
        return (
          <div className="fadeIn" onClick={()=>setMacroDetail(null)} style={{position:"fixed",inset:0,background:"rgba(10,31,28,0.5)",backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div className="fade" onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:560,background:"var(--bg-elev)",borderTopLeftRadius:32,borderTopRightRadius:32,padding:24,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -10px 40px -10px rgba(0,0,0,0.15)"}}>
              <div style={{width:42,height:5,background:"var(--line-strong)",borderRadius:4,margin:"0 auto 22px"}}/>

                <div style={{width:60,height:60,borderRadius:18,background:"var(--bg-sunken)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>{macroDetail.icon}</div>

                  <div className="serif" style={{fontSize:26,color:"var(--ink)",lineHeight:1}}>{macroDetail.label}</div>

                <button onClick={()=>setMacroDetail(null)} style={{background:"var(--bg-sunken)",border:"none",borderRadius:"50%",width:36,height:36,color:"var(--ink-soft)",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>

              <div style={{display:"flex",gap:10,marginBottom:18}}>
                <div style={{flex:1,padding:"14px 16px",background:"var(--bg-sunken)",borderRadius:14}}>
                  <div style={{fontSize:10,color:"var(--ink-mute)",letterSpacing:1,fontWeight:700,textTransform:"uppercase"}}>Llevas</div>
                  <div style={{fontSize:22,color:"var(--ink)",fontWeight:800,marginTop:4,lineHeight:1}}>{Math.round(macroDetail.current)}<span style={{fontSize:13,color:"var(--ink-mute)",fontWeight:600}}>{macroDetail.unit}</span></div>

                <div style={{flex:1,padding:"14px 16px",background:"var(--bg-sunken)",borderRadius:14}}>
                  <div style={{fontSize:10,color:"var(--ink-mute)",letterSpacing:1,fontWeight:700,textTransform:"uppercase"}}>{macroDetail.isLimit?"Límite":"Meta"}</div>
                  <div style={{fontSize:22,color:"var(--ink)",fontWeight:800,marginTop:4,lineHeight:1}}>{macroDetail.target}<span style={{fontSize:13,color:"var(--ink-mute)",fontWeight:600}}>{macroDetail.unit}</span></div>
                </div>
                <div style={{flex:1,padding:"14px 16px",background:"var(--bg-sunken)",borderRadius:14}}>
                  <div style={{fontSize:10,color:"var(--ink-mute)",letterSpacing:1,fontWeight:700,textTransform:"uppercase"}}>{diff>=0?"Faltan":"Pasaste"}</div>

              <div style={{height:8,background:"var(--bg-sunken)",borderRadius:6,overflow:"hidden",marginBottom:6}}>
                <div style={{height:"100%",width:Math.min(100,pct)+"%",background:advice.color,borderRadius:6,transition:"width 1s cubic-bezier(0.16,1,0.3,1)"}}/>
              </div>
              <div style={{fontSize:11,color:"var(--ink-mute)",fontWeight:600,textAlign:"right",marginBottom:18}}>{pct}% {macroDetail.isLimit?"del límite":"de tu meta"}</div>

              {/* Breakdown of contributors */}
              {(() => {
                const contributors = [];
                todayEntries.forEach(entry => {
                  if (entry.items && entry.items.length > 0) {
                    entry.items.forEach(item => {
                      const val = item[macroDetail.key] || 0;
                      if (val > 0) {
                        contributors.push({name: item.name, portion: item.portion, value: val, meal: entry.meal});
                      }
                    });
                  } else if (entry.totals && entry.totals[macroDetail.key]) {
                    contributors.push({name: entry.originalText || "Comida", portion: "", value: entry.totals[macroDetail.key], meal: entry.meal});

                return (
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,color:"var(--ink-mute)",letterSpacing:1.5,fontWeight:700,textTransform:"uppercase",marginBottom:10}}>📋 De dónde viene</div>

                          <div key={i} style={{padding:"12px 14px",borderBottom:i<Math.min(contributors.length,8)-1?"1px solid var(--line)":"none",display:"flex",alignItems:"center",gap:10}}>

                              <div style={{fontSize:14,color:"var(--ink)",fontWeight:800,lineHeight:1}}>{Math.round(c.value)}<span style={{fontSize:10,color:"var(--ink-mute)",fontWeight:600}}>{macroDetail.unit}</span></div>
                              <div style={{fontSize:10,color:"var(--ink-mute)",fontWeight:600,marginTop:2}}>{pctOfTotal}%</div>
                            </div>
                          </div>
                        );

              <div>
                <div className="serif" style={{fontSize:30,color:"var(--ink)",lineHeight:1}}>Tu reporte</div>

                <button onClick={()=>setShowReport(false)} style={{background:"var(--bg-sunken)",border:"none",borderRadius:"50%",width:36,height:36,color:"var(--ink-soft)",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>

              <div style={{padding:"40px 20px",textAlign:"center"}}>

                  </div>
                  <div style={{flex:1,padding:"12px 14px",background:"var(--primary-soft)",borderRadius:12}}>

                  // Parse the report into sections by emoji headers
                  const sectionConfig = [
                    {emoji:"📊", key:"resumen", title:"Resumen", color:"var(--primary)", bg:"rgba(8,145,178,0.06)", border:"rgba(8,145,178,0.15)"},

                    {emoji:"📅", key:"patrones", title:"Patrones", color:"#a78bfa", bg:"rgba(167,139,250,0.06)", border:"rgba(167,139,250,0.18)"},

                  ];

                  const text = weeklyReport.content || "";
                  const sections = [];
                  let currentSection = null;
                  const lines = text.split("\n");

                  for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;

                    let foundSection = null;
                    for (const cfg of sectionConfig) {
                      if (trimmed.startsWith(cfg.emoji) || trimmed.includes(cfg.title.toUpperCase())) {
                        foundSection = cfg;
                        break;
                      }
                    }

                    if (foundSection) {
                      if (currentSection) sections.push(currentSection);
                      currentSection = {...foundSection, items: []};
                    } else if (currentSection) {
                      // Clean up bullet markers
                      const clean = trimmed.replace(/^[-•*]\s*/, "").trim();
                      if (clean) currentSection.items.push(clean);
                    }
                  }
                  if (currentSection) sections.push(currentSection);

                  // Fallback if no sections found
                  if (sections.length === 0) {
                    return (
                      <div style={{background:"var(--bg-sunken)",borderRadius:16,padding:20,fontSize:14,lineHeight:1.7,color:"var(--ink)",whiteSpace:"pre-wrap"}}>
                        {text}
                      </div>
                    );
                  }

                  return (
                    <div style={{display:"flex",flexDirection:"column",gap:14}}>
                      {sections.map((s,i)=>(
                        <div key={i} style={{background:s.bg,border:"1px solid "+s.border,borderRadius:18,padding:"18px 20px",overflow:"hidden"}}>
                          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                            <div style={{width:36,height:36,borderRadius:11,background:"var(--bg-elev)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>{s.emoji}</div>
                            <div style={{fontSize:15,color:s.color,fontWeight:800,letterSpacing:0.3,textTransform:"uppercase"}}>{s.title}</div>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:8}}>
                            {s.items.map((item,j)=>{
                              // Detect if it's a key:value line (e.g., "Calorías: 1850")
                              const colonIdx = item.indexOf(":");
                              if (colonIdx > 0 && colonIdx < 35) {
                                const key = item.substring(0,colonIdx).trim();
                                const val = item.substring(colonIdx+1).trim();
                                return (
                                  <div key={j} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"6px 0"}}>
                                    <div style={{flex:"0 0 auto",fontSize:13,color:"var(--ink-mute)",fontWeight:600,minWidth:90}}>{key}</div>
                                    <div style={{flex:1,fontSize:14,color:"var(--ink)",fontWeight:600,lineHeight:1.5}}>{val}</div>
                                  </div>
                                );
                              }
                              // Numbered or bulleted item
                              const isBullet = /^\d+[.)]\s/.test(item) || s.key==="plan";
                              return (
                                <div key={j} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"4px 0"}}>
                                  {isBullet && <div style={{flex:"0 0 auto",width:22,height:22,borderRadius:"50%",background:s.color,color:"#fff",fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",marginTop:1}}>{j+1}</div>}
                                  <div style={{flex:1,fontSize:14,color:"var(--ink)",lineHeight:1.55,fontWeight:isBullet?600:500}}>{item.replace(/^\d+[.)]\s*/, "")}</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })()}

                <div style={{fontSize:11,color:"var(--ink-mute)",textAlign:"center",marginTop:14,fontWeight:500}}>
                  Generado {new Date(weeklyReport.timestamp).toLocaleString("es-MX",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}
                </div>
              </>
            ) : null}
          </div>
        </div>
      )}

      {/* FAB */}
      {tab==="today" && (
        <button onClick={()=>setShowFoodModal(true)} className="tap-effect" style={{position:"fixed",bottom:24,right:24,width:60,height:60,borderRadius:30,background:"linear-gradient(135deg,var(--mint),var(--primary))",border:"none",color:"#fff",fontSize:32,fontWeight:300,cursor:"pointer",boxShadow:"0 16px 40px -8px rgba(8,145,178,0.4),0 4px 8px rgba(0,0,0,0.08)",zIndex:40,lineHeight:1,paddingBottom:6}}>+</button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
